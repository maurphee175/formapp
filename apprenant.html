<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace Stagiaire · FormApp</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0d0f14;
  --surface: #13161e;
  --surface2:#1a1e28;
  --border:  #252932;
  --border2: #2e3440;
  --ink:     #eef0f5;
  --ink2:    #8890a4;
  --ink3:    #4d5568;
  --accent:  #6c8fff;
  --glow:    rgba(108,143,255,0.11);
  --gborder: rgba(108,143,255,0.24);
  --green:   #4ade80;
  --green-s: rgba(74,222,128,0.09);
  --green-b: rgba(74,222,128,0.24);
  --orange:  #fb923c;
  --orange-s:rgba(251,146,60,0.09);
  --orange-b:rgba(251,146,60,0.24);
  --red:     #f87171;
  --red-s:   rgba(248,113,113,0.09);
  --red-b:   rgba(248,113,113,0.24);
  --gold:    #fbbf24;
  --gold-s:  rgba(251,191,36,0.09);
  --gold-b:  rgba(251,191,36,0.24);
  --purple:  #a78bfa;
  --purple-s:rgba(167,139,250,0.09);
  --purple-b:rgba(167,139,250,0.24);
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; }
body { font-family:'Instrument Sans',sans-serif; background:var(--bg); color:var(--ink); }

/* ════════════════════════════════
   ÉCRAN DE CONNEXION
════════════════════════════════ */
#screenLogin {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  padding:24px 16px;
}
.login-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:18px; padding:44px 48px;
  width:100%; max-width:420px; text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,0.4);
}
.login-logo {
  width:64px; height:64px; border-radius:18px;
  background:var(--glow); border:1px solid var(--gborder);
  display:flex; align-items:center; justify-content:center;
  font-size:1.7rem; margin:0 auto 20px;
}
.login-title { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; margin-bottom:6px; }
.login-sub { font-size:0.8rem; color:var(--ink3); line-height:1.6; margin-bottom:30px; }

.form-label {
  display:block; font-size:0.65rem; font-weight:700; text-transform:uppercase;
  letter-spacing:0.13em; color:var(--ink3); margin-bottom:7px; text-align:left;
}
.form-input {
  width:100%; padding:13px 15px;
  background:var(--surface2); border:1.5px solid var(--border2);
  border-radius:10px; color:var(--ink);
  font-family:'Instrument Sans',sans-serif; font-size:0.92rem;
  outline:none; transition:border-color 0.15s; margin-bottom:14px;
}
.form-input:focus { border-color:var(--accent); background:var(--surface); }
.form-input.error { border-color:var(--red); animation:shake 0.3s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }

.login-btn {
  width:100%; padding:13px; margin-top:4px;
  background:var(--accent); color:white; border:none;
  border-radius:10px; font-family:'Syne',sans-serif;
  font-size:0.88rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em;
  cursor:pointer; transition:all 0.18s;
}
.login-btn:hover { background:#5a78e8; transform:translateY(-1px); box-shadow:0 6px 20px rgba(108,143,255,0.3); }
.login-btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; box-shadow:none; }
.login-error { font-size:0.73rem; color:var(--red); margin-top:8px; min-height:16px; text-align:center; }
.login-note { font-size:0.72rem; color:var(--ink3); margin-top:20px; line-height:1.6; }

/* ════════════════════════════════
   ESPACE STAGIAIRE (après connexion)
════════════════════════════════ */
#screenApp { display:none; }

/* Header */
.app-header {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 28px; height:54px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:20;
}
.app-brand { font-family:'Syne',sans-serif; font-weight:800; font-size:0.86rem; text-transform:uppercase; letter-spacing:0.13em; color:var(--accent); cursor:pointer; }
.app-header-right { display:flex; align-items:center; gap:12px; }
.user-pill {
  display:flex; align-items:center; gap:8px;
  font-size:0.76rem; color:var(--ink2);
}
.user-av {
  width:28px; height:28px; border-radius:50%;
  background:var(--glow); border:1px solid var(--gborder);
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-size:0.65rem; font-weight:800; color:var(--accent);
}
.logout-link {
  font-size:0.68rem; font-weight:600; text-transform:uppercase; letter-spacing:0.09em;
  color:var(--ink3); cursor:pointer; transition:color 0.15s; border:none; background:none;
}
.logout-link:hover { color:var(--red); }

/* Hero */
.app-hero {
  padding:40px 28px 32px; max-width:820px; margin:0 auto;
  display:flex; align-items:center; gap:24px;
}
.hero-av {
  width:60px; height:60px; border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-size:1.3rem; font-weight:800;
}
.hero-text-greeting { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.15em; color:var(--ink3); margin-bottom:5px; }
.hero-text-name { font-family:'Syne',sans-serif; font-size:1.7rem; font-weight:800; line-height:1.1; }
.hero-text-meta { font-size:0.78rem; color:var(--ink3); margin-top:4px; }

/* Statut card */
.status-card {
  max-width:820px; margin:0 auto 0; padding:0 28px;
}
.status-inner {
  border-radius:12px; padding:18px 22px;
  display:flex; align-items:center; gap:16px;
  border:1.5px solid;
}
.status-icon { font-size:1.5rem; flex-shrink:0; }
.status-label { font-size:0.62rem; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; margin-bottom:3px; }
.status-text { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; }
.status-sub { font-size:0.75rem; margin-top:2px; line-height:1.5; }



/* Contenu */
.app-body { max-width:820px; margin:0 auto; padding:24px 28px 64px; }
.section-lbl {
  font-size:0.61rem; font-weight:700; text-transform:uppercase; letter-spacing:0.15em;
  color:var(--ink3); display:flex; align-items:center; gap:10px;
  margin:24px 0 12px;
}
.section-lbl::after { content:''; flex:1; height:1px; background:var(--border); }

/* Carte révision (featured) */
.rev-card {
  background:linear-gradient(135deg,#1a1f2e,#141820);
  border:1.5px solid var(--accent); border-radius:14px;
  padding:26px 28px; display:flex; align-items:center; gap:22px;
  text-decoration:none; color:inherit; cursor:pointer;
  transition:all 0.2s; position:relative; overflow:hidden;
}
.rev-card::before {
  content:''; position:absolute; top:-50px; right:-50px;
  width:180px; height:180px; border-radius:50%;
  background:var(--glow); pointer-events:none;
}
.rev-card:hover { transform:translateY(-2px); box-shadow:0 12px 40px rgba(108,143,255,0.2); border-color:#8aabff; }
.rev-icon { width:54px; height:54px; border-radius:13px; flex-shrink:0; background:var(--glow); border:1px solid var(--gborder); display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
.rev-body { flex:1; }
.rev-badge { font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:var(--accent); margin-bottom:5px; }
.rev-title { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:800; margin-bottom:4px; }
.rev-desc { font-size:0.79rem; color:var(--ink2); line-height:1.5; }
.rev-arrow { font-size:1.3rem; color:var(--accent); flex-shrink:0; transition:transform 0.18s; }
.rev-card:hover .rev-arrow { transform:translateX(4px); }

/* Grille ressources */
.resources-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }

.res-card {
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:12px; padding:18px 20px;
  display:flex; align-items:flex-start; gap:14px;
  text-decoration:none; color:inherit; cursor:pointer;
  transition:all 0.18s;
}
.res-card:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(0,0,0,0.3); }
.res-card.t-pdf:hover   { border-color:var(--red-b); }
.res-card.t-link:hover  { border-color:var(--gborder); }
.res-card.t-video:hover { border-color:var(--gold-b); }
.res-card.t-doc:hover   { border-color:var(--orange-b); }

.res-icon { width:40px; height:40px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.1rem; }
.t-pdf   .res-icon { background:var(--red-s); }
.t-link  .res-icon { background:var(--glow); }
.t-video .res-icon { background:var(--gold-s); }
.t-doc   .res-icon { background:var(--orange-s); }

.res-body { flex:1; min-width:0; }
.res-type-label { font-size:0.57rem; font-weight:700; text-transform:uppercase; letter-spacing:0.11em; margin-bottom:4px; }
.t-pdf   .res-type-label { color:var(--red); }
.t-link  .res-type-label { color:var(--accent); }
.t-video .res-type-label { color:var(--gold); }
.t-doc   .res-type-label { color:var(--orange); }
.res-title { font-family:'Syne',sans-serif; font-size:0.86rem; font-weight:700; line-height:1.3; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.res-desc { font-size:0.71rem; color:var(--ink3); line-height:1.4; }

/* Carte QCM */
.qcm-card {
  background:var(--surface); border:1.5px solid var(--green-b);
  border-radius:12px; padding:18px 22px;
  display:flex; align-items:center; gap:16px;
  cursor:pointer; transition:all 0.18s;
}
.qcm-card:hover { background:var(--green-s); transform:translateY(-1px); box-shadow:0 6px 20px rgba(74,222,128,0.1); }
.qcm-icon { width:44px; height:44px; border-radius:11px; flex-shrink:0; background:var(--green-s); border:1px solid var(--green-b); display:flex; align-items:center; justify-content:center; font-size:1.2rem; }
.qcm-body { flex:1; }
.qcm-badge { font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:var(--green); margin-bottom:3px; }
.qcm-title { font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; }
.qcm-sub { font-size:0.73rem; color:var(--ink3); margin-top:2px; }
.qcm-cta { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--green); flex-shrink:0; }

/* Toast */
.toast { position:fixed; bottom:20px; right:20px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 18px; font-size:0.78rem; color:var(--ink2); opacity:0; transform:translateY(8px); transition:all 0.22s; pointer-events:none; z-index:300; }
.toast.show { opacity:1; transform:none; }

@keyframes fadeUp { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none} }
.fade-in { animation:fadeUp 0.3s ease both; }

@media(max-width:560px) {
  .login-card { padding:30px 22px; }
  .resources-grid { grid-template-columns:1fr; }
  .app-hero { flex-direction:column; text-align:center; gap:14px; }
  .app-body { padding:16px 16px 48px; }
  .rev-card { flex-direction:column; text-align:center; gap:14px; }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     ÉCRAN 1 — CONNEXION
══════════════════════════════════════ -->
<div id="screenLogin">
  <div class="login-card">
    <div class="login-logo">🚑</div>
    <div class="login-title">Espace Stagiaire</div>
    <div class="login-sub">Connectez-vous avec vos identifiants transmis par votre formateur.</div>

    <label class="form-label" for="loginId">Identifiant</label>
    <input class="form-input" id="loginId" type="text" placeholder="ex : C-001 ou prénom.nom"
      autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('loginPwd').focus()">

    <label class="form-label" for="loginPwd">Mot de passe</label>
    <input class="form-input" id="loginPwd" type="password" placeholder="••••••••"
      autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">

    <button class="login-btn" onclick="doLogin()">Se connecter →</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-note">Identifiants oubliés ? Contactez votre formateur référent.</div>
  </div>
</div>

<!-- ══════════════════════════════════════
     ÉCRAN 2 — ESPACE STAGIAIRE
══════════════════════════════════════ -->
<div id="screenApp">

  <header class="app-header">
    <div class="app-brand" onclick="goPortal()">FormApp</div>
    <div class="app-header-right">
      <div class="user-pill">
        <div class="user-av" id="userAv">—</div>
        <span id="userName">—</span>
      </div>
      <button class="logout-link" onclick="doLogout()">Déconnexion</button>
    </div>
  </header>

  <div class="app-hero">
    <div class="hero-av" id="heroAv" style="background:#1a1e28;color:#6c8fff">—</div>
    <div>
      <div class="hero-text-greeting">Formation de Formateur — Espace personnel</div>
      <div class="hero-text-name" id="heroName">—</div>
      <div class="hero-text-meta" id="heroMeta">—</div>
    </div>
  </div>



  <div class="app-body" id="appBody">
    <!-- Ressources injectées dynamiquement -->
  </div>

</div>

<!-- ══ BOUTON ÉDITION (activé par l'admin via postMessage) ══ -->
<button id="editFab" title="Modifier les ressources" onclick="openEditor()"
  style="display:none;position:fixed;bottom:22px;right:22px;z-index:100;
    width:46px;height:46px;border-radius:50%;
    background:#13161e;border:1.5px solid #2e3440;
    color:#8890a4;font-size:1.1rem;cursor:pointer;
    transition:all 0.18s;box-shadow:0 4px 16px rgba(0,0,0,0.4)">
  ✏️
</button>

<!-- ══ MODAL ÉDITEUR RESSOURCES ══ -->
<div id="editorOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);
  backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:#13161e;border:1px solid #252932;border-radius:16px;
    padding:28px 32px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;
    box-shadow:0 24px 80px rgba(0,0,0,0.6)">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800">✏️ Modifier les ressources</div>
      <button onclick="closeEditor()" style="background:none;border:none;color:#4d5568;font-size:1.2rem;cursor:pointer;padding:4px">✕</button>
    </div>

    <!-- Révision -->
    <div style="background:#1a1e28;border-radius:10px;padding:16px 18px;margin-bottom:16px;border:1px solid #252932">
      <div style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:#4d5568;margin-bottom:12px">Application de révision</div>
      <label style="display:block;font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#4d5568;margin-bottom:5px">URL</label>
      <input id="ed_revUrl" type="url" placeholder="https://..." style="width:100%;padding:9px 12px;background:#0d0f14;border:1px solid #2e3440;border-radius:7px;color:#eef0f5;font-family:'Instrument Sans',sans-serif;font-size:0.86rem;outline:none;margin-bottom:10px">
      <label style="display:block;font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#4d5568;margin-bottom:5px">Nom affiché</label>
      <input id="ed_revTitle" type="text" placeholder="Application de révision PSC1" style="width:100%;padding:9px 12px;background:#0d0f14;border:1px solid #2e3440;border-radius:7px;color:#eef0f5;font-family:'Instrument Sans',sans-serif;font-size:0.86rem;outline:none;margin-bottom:10px">
      <label style="display:block;font-size:0.63rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#4d5568;margin-bottom:5px">Description</label>
      <textarea id="ed_revDesc" rows="2" placeholder="Description courte…" style="width:100%;padding:9px 12px;background:#0d0f14;border:1px solid #2e3440;border-radius:7px;color:#eef0f5;font-family:'Instrument Sans',sans-serif;font-size:0.86rem;outline:none;resize:vertical"></textarea>
    </div>

    <!-- Liste documents -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:#4d5568">Documents, vidéos & liens</div>
      <button onclick="edAddItem()" style="padding:5px 12px;background:transparent;border:1px dashed #2e3440;border-radius:6px;color:#8890a4;font-family:'Instrument Sans',sans-serif;font-size:0.75rem;cursor:pointer;transition:all 0.14s"
        onmouseenter="this.style.borderColor='#6c8fff';this.style.color='#6c8fff'"
        onmouseleave="this.style.borderColor='#2e3440';this.style.color='#8890a4'">+ Ajouter</button>
    </div>
    <div id="ed_itemsList" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px"></div>

    <!-- Actions -->
    <div style="display:flex;gap:10px;justify-content:flex-end;padding-top:16px;border-top:1px solid #252932">
      <button onclick="closeEditor()" style="padding:9px 20px;background:transparent;border:1px solid #252932;border-radius:8px;color:#8890a4;font-family:'Instrument Sans',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all 0.14s">Annuler</button>
      <button onclick="saveEditor()" style="padding:9px 22px;background:#6c8fff;border:none;border-radius:8px;color:white;font-family:'Syne',sans-serif;font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;cursor:pointer;transition:all 0.15s"
        onmouseenter="this.style.background='#5a78e8'" onmouseleave="this.style.background='#6c8fff'">💾 Enregistrer</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════
// DONNÉES PARTAGÉES
// ══════════════════════════════════════════════════════════
const SHARED_KEY   = 'formapp_data';
const RES_KEY      = 'formapp_apprenant_resources';
const SESSION_KEY  = 'formapp_stagiaire_session';

// Couleurs avatars
const AV_COLS = [
  {bg:'#1a2a4a',fg:'#6c8fff'},{bg:'#0e2a1a',fg:'#4ade80'},
  {bg:'#2a1a0e',fg:'#fb923c'},{bg:'#2a1e08',fg:'#fbbf24'},
  {bg:'#1e0e2a',fg:'#a78bfa'},
];

// ══════════════════════════════════════════════════════════
// RESSOURCES PAR DÉFAUT
// (modifiables via Admin → les encadrants peuvent les mettre à jour)
// ══════════════════════════════════════════════════════════
const DEFAULT_RESOURCES = {
  revision: {
    url:   'https://votre-app-revision.fr',
    title: 'Application de révision PSC1',
    desc:  'Révisez les gestes de secourisme, les procédures et les connaissances théoriques à votre rythme.',
    icon:  '🧠',
  },
  items: [
    { id:'r1', type:'pdf',   icon:'📄', title:'Référentiel PSC1 officiel',        desc:'Référentiel national de la formation PSC1',                       url:'#' },
    { id:'r2', type:'pdf',   icon:'📋', title:'Fiche RCP adulte',                 desc:'Protocole complet — compressions + DAE',                          url:'#' },
    { id:'r3', type:'pdf',   icon:'📋', title:'Fiche Garrot & hémorragies',       desc:'CAT, garrot tourniquet, garrot de fortune',                        url:'#' },
    { id:'r4', type:'pdf',   icon:'📋', title:'Fiche PLS & inconscient',          desc:'Position Latérale de Sécurité, gestion des voies aériennes',       url:'#' },
    { id:'r5', type:'pdf',   icon:'📋', title:'Fiche étouffement nourrisson',     desc:'OVACE totale — claques dos + compressions thoraciques',            url:'#' },
    { id:'r6', type:'video', icon:'🎥', title:'Vidéo — Démonstration RCP + DAE', desc:'Vidéo officielle de démonstration des gestes',                     url:'#' },
    { id:'r7', type:'video', icon:'🎥', title:'Vidéo — Pose du garrot CAT',      desc:'Démonstration pas à pas de la pose du garrot',                     url:'#' },
    { id:'r8', type:'link',  icon:'🔗', title:'Numéros d\'urgence France',        desc:'15 · 18 · 112 · 114 — guide officiel',                            url:'https://www.gouvernement.fr/risques/les-numeros-d-urgence' },
    { id:'r9', type:'link',  icon:'📅', title:'Programme de la journée',          desc:'Déroulé des ateliers et planning de la journée de test',           url:'#' },
  ]
};

function getResources() {
  try {
    const r = localStorage.getItem(RES_KEY);
    return r ? JSON.parse(r) : DEFAULT_RESOURCES;
  } catch(e) { return DEFAULT_RESOURCES; }
}

function getAppData() {
  try {
    const r = localStorage.getItem(SHARED_KEY);
    return r ? JSON.parse(r) : { candidats:[], date:'', promo:'' };
  } catch(e) { return { candidats:[], date:'', promo:'' }; }
}

// ══════════════════════════════════════════════════════════
// COMPTES STAGIAIRES
// Les comptes sont stockés dans formapp_data.candidats
// Chaque candidat a un login (son ID) et un mot de passe généré par l'admin
// L'admin peut définir le mot de passe dans un champ dédié
// ══════════════════════════════════════════════════════════
function findCandidat(loginInput) {
  const appData = getAppData();
  const q = loginInput.trim().toLowerCase();
  return appData.candidats.find(c =>
    c.id.toLowerCase() === q ||
    (c.prenom + '.' + c.nom).toLowerCase() === q ||
    (c.prenom + ' ' + c.nom).toLowerCase() === q
  );
}

function checkPassword(candidat, pwd) {
  // Mot de passe = celui défini par l'admin, ou par défaut : prénom en minuscules
  const expected = candidat.password || candidat.prenom.toLowerCase();
  return pwd === expected;
}

// ══════════════════════════════════════════════════════════
// CONNEXION
// ══════════════════════════════════════════════════════════
function doLogin() {
  const id  = document.getElementById('loginId').value.trim();
  const pwd = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginError');

  if (!id || !pwd) { errEl.textContent = 'Remplissez tous les champs.'; return; }

  const cand = findCandidat(id);

  if (!cand) {
    shake('loginId');
    errEl.textContent = 'Identifiant introuvable. Vérifiez ou contactez votre formateur.';
    return;
  }
  if (!checkPassword(cand, pwd)) {
    shake('loginPwd');
    errEl.textContent = 'Mot de passe incorrect.';
    document.getElementById('loginPwd').value = '';
    return;
  }

  // Sauvegarder la session
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({ id: cand.id, ts: Date.now() }));
  errEl.textContent = '';
  showApp(cand);
}

function shake(elId) {
  const el = document.getElementById(elId);
  el.classList.add('error');
  setTimeout(() => el.classList.remove('error'), 600);
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('screenApp').style.display = 'none';
  document.getElementById('screenLogin').style.display = 'flex';
  document.getElementById('loginId').value  = '';
  document.getElementById('loginPwd').value = '';
  document.getElementById('loginError').textContent = '';
}

function goPortal() {
  if (window.parent !== window)
    window.parent.postMessage({ type:'formapp-goto', target:'portal' }, '*');
}

// ══════════════════════════════════════════════════════════
// AFFICHAGE ESPACE STAGIAIRE
// ══════════════════════════════════════════════════════════
function showApp(cand) {
  document.getElementById('screenLogin').style.display = 'none';
  document.getElementById('screenApp').style.display   = 'block';

  const ci = getAppData().candidats.findIndex(c => c.id === cand.id) % AV_COLS.length;
  const col = AV_COLS[Math.max(0, ci)];
  const initials = cand.prenom[0] + cand.nom[0];

  // Header
  document.getElementById('userAv').textContent = initials;
  document.getElementById('userName').textContent = cand.prenom + ' ' + cand.nom;

  // Hero
  const heroAv = document.getElementById('heroAv');
  heroAv.textContent = initials;
  heroAv.style.background = col.bg;
  heroAv.style.color = col.fg;
  document.getElementById('heroName').textContent = cand.prenom + ' ' + cand.nom;
  const appData = getAppData();
  const appData2 = getAppData();
  const metaParts = [cand.id];
  if (cand.cs)     metaParts.push('CS : ' + cand.cs);
  if (cand.tuteur) metaParts.push('Tuteur : ' + cand.tuteur);
  if (appData2.promo) metaParts.push(appData2.promo);
  if (appData2.date)  metaParts.push(appData2.date);
  document.getElementById('heroMeta').textContent = metaParts.join(' · ');

  // Ressources
  renderResources();
}



function renderResources() {
  const res = getResources();
  const body = document.getElementById('appBody');
  body.innerHTML = '';

  // ── Révision ──
  body.innerHTML += `<div class="section-lbl fade-in">Application de révision</div>`;
  body.innerHTML += `
    <a class="rev-card fade-in" href="${res.revision.url}" target="_blank" rel="noopener"
      ${res.revision.url==='#'||res.revision.url.includes('votre-app')?'onclick="return false;style.opacity:.5"':''}>
      <div class="rev-icon">${res.revision.icon||'🧠'}</div>
      <div class="rev-body">
        <div class="rev-badge">Accès direct</div>
        <div class="rev-title">${res.revision.title}</div>
        <div class="rev-desc">${res.revision.desc}</div>
      </div>
      <div class="rev-arrow">→</div>
    </a>`;

  // ── QCM ──
  body.innerHTML += `<div class="section-lbl fade-in" style="animation-delay:.05s">Évaluation</div>`;
  body.innerHTML += `
    <div class="qcm-card fade-in" style="animation-delay:.08s" onclick="goQCM()">
      <div class="qcm-icon">📝</div>
      <div class="qcm-body">
        <div class="qcm-badge">QCM Théorique</div>
        <div class="qcm-title">Passer le questionnaire en ligne</div>
        <div class="qcm-sub">Saisissez votre code d'accès personnel</div>
      </div>
      <div class="qcm-cta">Commencer →</div>
    </div>`;

  // ── Ressources ──
  if (res.items && res.items.length > 0) {
    const pdfs   = res.items.filter(r => r.type === 'pdf'  || r.type === 'doc');
    const videos = res.items.filter(r => r.type === 'video');
    const links  = res.items.filter(r => r.type === 'link');

    if (pdfs.length)   renderGroup(body, '📄 Documents & fiches', pdfs,   0.1);
    if (videos.length) renderGroup(body, '🎥 Vidéos',             videos, 0.15);
    if (links.length)  renderGroup(body, '🔗 Liens utiles',        links,  0.2);
  }
}

function renderGroup(body, label, items, delay) {
  body.innerHTML += `<div class="section-lbl fade-in" style="animation-delay:${delay}s">${label}</div>`;
  let grid = `<div class="resources-grid fade-in" style="animation-delay:${delay+0.03}s">`;
  items.forEach((r, i) => {
    const disabled = !r.url || r.url === '#';
    grid += `
      <a class="res-card t-${r.type}" ${disabled ? 'style="opacity:0.45;cursor:not-allowed" onclick="return false"' : `href="${r.url}" target="_blank" rel="noopener"`}>
        <div class="res-icon">${r.icon}</div>
        <div class="res-body">
          <div class="res-type-label">${{pdf:'PDF',doc:'Document',video:'Vidéo',link:'Lien externe'}[r.type]||r.type}</div>
          <div class="res-title">${r.title}</div>
          <div class="res-desc">${r.desc}</div>
        </div>
      </a>`;
  });
  grid += '</div>';
  body.innerHTML += grid;
}

function goQCM() {
  if (window.parent !== window)
    window.parent.postMessage({ type:'formapp-goto', target:'qcm' }, '*');
  else
    window.location.href = 'qcm.html';
}

// ══════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ══════════════════════════════════════════════════════════
// ÉDITEUR RESSOURCES (activé par l'admin)
// ══════════════════════════════════════════════════════════
let editorEnabled = false;

function enableEditMode() {
  editorEnabled = true;
  const fab = document.getElementById('editFab');
  fab.style.display = 'flex';
  fab.style.alignItems = 'center';
  fab.style.justifyContent = 'center';
  // Pulse pour attirer l'attention
  fab.style.animation = 'pulse 1s ease 3';
  if (!document.getElementById('pulseStyle')) {
    const s = document.createElement('style');
    s.id = 'pulseStyle';
    s.textContent = '@keyframes pulse{0%,100%{box-shadow:0 4px 16px rgba(0,0,0,0.4)}50%{box-shadow:0 4px 28px rgba(108,143,255,0.5);border-color:#6c8fff}}';
    document.head.appendChild(s);
  }
  showToast('✏️ Mode édition activé — cliquez sur le bouton en bas à droite');
}

function openEditor() {
  const res = getResources();
  document.getElementById('ed_revUrl').value   = res.revision.url   || '';
  document.getElementById('ed_revTitle').value = res.revision.title || '';
  document.getElementById('ed_revDesc').value  = res.revision.desc  || '';
  renderEdItems(res.items);
  const overlay = document.getElementById('editorOverlay');
  overlay.style.display = 'flex';
  setTimeout(() => overlay.style.opacity = '1', 10);
}

function closeEditor() {
  document.getElementById('editorOverlay').style.display = 'none';
}

function renderEdItems(items) {
  const list = document.getElementById('ed_itemsList');
  const TYPE_COLORS = { pdf:'#f87171', video:'#fbbf24', link:'#6c8fff', doc:'#fb923c' };
  const TYPE_LABELS = { pdf:'PDF', video:'Vidéo', link:'Lien', doc:'Document' };
  list.innerHTML = items.map((item, i) => `
    <div style="display:grid;grid-template-columns:auto 1fr 1fr auto auto;gap:8px;align-items:center;
      background:#1a1e28;border:1px solid #252932;border-radius:8px;padding:10px 12px">
      <select data-i="${i}" data-f="type" onchange="edUpdate(this)"
        style="padding:5px 7px;background:#0d0f14;border:1px solid #2e3440;border-radius:5px;
          color:${TYPE_COLORS[item.type]||'#8890a4'};font-size:0.72rem;outline:none;cursor:pointer">
        <option value="pdf"   ${item.type==='pdf'  ?'selected':''}>📄 PDF</option>
        <option value="video" ${item.type==='video'?'selected':''}>🎥 Vidéo</option>
        <option value="link"  ${item.type==='link' ?'selected':''}>🔗 Lien</option>
      </select>
      <input data-i="${i}" data-f="title" onchange="edUpdate(this)" value="${(item.title||'').replace(/"/g,'&quot;')}" placeholder="Titre"
        style="padding:6px 9px;background:#0d0f14;border:1px solid #2e3440;border-radius:5px;
          color:#eef0f5;font-family:'Instrument Sans',sans-serif;font-size:0.8rem;outline:none;width:100%">
      <input data-i="${i}" data-f="url" onchange="edUpdate(this)" value="${item.url&&item.url!=='#'?item.url:''}" placeholder="https://..."
        style="padding:6px 9px;background:#0d0f14;border:1px solid #2e3440;border-radius:5px;
          color:#8890a4;font-family:'Instrument Sans',sans-serif;font-size:0.75rem;outline:none;width:100%">
      <input data-i="${i}" data-f="desc" onchange="edUpdate(this)" value="${(item.desc||'').replace(/"/g,'&quot;')}" placeholder="Description courte"
        style="padding:6px 9px;background:#0d0f14;border:1px solid #2e3440;border-radius:5px;
          color:#8890a4;font-family:'Instrument Sans',sans-serif;font-size:0.75rem;outline:none;width:100%;grid-column:2/5">
      <button onclick="edRemove(${i})"
        style="width:28px;height:28px;border-radius:6px;border:1px solid rgba(248,113,113,0.25);
          background:rgba(248,113,113,0.08);color:#f87171;cursor:pointer;font-size:0.85rem;
          display:flex;align-items:center;justify-content:center;grid-row:1;grid-column:5">✕</button>
    </div>`).join('');
}

// Mise à jour en temps réel dans le state temporaire
let _edState = null;
function getEdState() {
  if (!_edState) _edState = JSON.parse(JSON.stringify(getResources()));
  return _edState;
}

function edUpdate(el) {
  const i = parseInt(el.dataset.i);
  const f = el.dataset.f;
  const state = getEdState();
  state.items[i][f] = el.value;
  if (f === 'type') {
    const icons = { pdf:'📄', video:'🎥', link:'🔗', doc:'📋' };
    state.items[i].icon = icons[el.value] || '📄';
    el.style.color = { pdf:'#f87171', video:'#fbbf24', link:'#6c8fff', doc:'#fb923c' }[el.value] || '#8890a4';
  }
}

function edAddItem() {
  const state = getEdState();
  state.items.push({ id:'r'+Date.now(), type:'pdf', icon:'📄', title:'Nouveau document', desc:'', url:'' });
  renderEdItems(state.items);
}

function edRemove(i) {
  const state = getEdState();
  state.items.splice(i, 1);
  renderEdItems(state.items);
}

function saveEditor() {
  const state = getEdState();
  state.revision.url   = document.getElementById('ed_revUrl').value.trim()   || state.revision.url;
  state.revision.title = document.getElementById('ed_revTitle').value.trim() || state.revision.title;
  state.revision.desc  = document.getElementById('ed_revDesc').value.trim()  || state.revision.desc;
  // Récupérer les dernières valeurs saisies (onchange peut ne pas avoir déclenché)
  document.querySelectorAll('#ed_itemsList [data-i]').forEach(el => {
    const i = parseInt(el.dataset.i);
    if (state.items[i] && el.dataset.f) state.items[i][el.dataset.f] = el.value;
  });
  localStorage.setItem(RES_KEY, JSON.stringify(state));
  _edState = null;
  closeEditor();
  renderResources();
  showToast('✓ Ressources enregistrées');
  // Notifier l'admin si ouvert en iframe
  if (window.parent !== window)
    window.parent.postMessage({ type:'formapp-resources-saved' }, '*');
}

// ══════════════════════════════════════════════════════════
// MESSAGES PARENT (navigation FormApp)
// ══════════════════════════════════════════════════════════
window.addEventListener('message', e => {
  if (e.data?.type === 'formapp-focus') {
    const sess = sessionStorage.getItem(SESSION_KEY);
    if (sess) {
      try {
        const { id } = JSON.parse(sess);
        const cand = getAppData().candidats.find(c => c.id === id);
        if (cand) showApp(cand);
      } catch(er) {}
    }
  }
  // Déconnexion forcée depuis le portail
  if (e.data?.type === 'formapp-logout') {
    sessionStorage.removeItem(SESSION_KEY);
    sessionStorage.removeItem('formapp_edit_mode');
    document.getElementById('screenApp').style.display = 'none';
    document.getElementById('screenLogin').style.display = 'flex';
    document.getElementById('loginId').value = '';
    document.getElementById('loginPwd').value = '';
  }
  if (e.data?.type === 'formapp-enable-edit') {
    enableEditMode();
    // Passer directement à l'écran app en mode admin (sans login)
    if (document.getElementById('screenLogin').style.display !== 'none') {
      document.getElementById('screenLogin').style.display = 'none';
      document.getElementById('screenApp').style.display = 'block';
      // Hero en mode admin
      document.getElementById('heroName').textContent = 'Vue formateur';
      document.getElementById('heroMeta').textContent = 'Mode édition des ressources';
      document.getElementById('userAv').textContent = '✏️';
      document.getElementById('userName').textContent = 'Formateur';
      renderResources();
    }
  }
});

// ══════════════════════════════════════════════════════════
// BOOT — vérifier session existante
// ══════════════════════════════════════════════════════════
(function init() {
  // Mode edition activé depuis l'admin ?
  if (sessionStorage.getItem('formapp_edit_mode') === '1') {
    sessionStorage.removeItem('formapp_edit_mode');
    enableEditMode();
    document.getElementById('screenLogin').style.display = 'none';
    document.getElementById('screenApp').style.display = 'block';
    document.getElementById('heroName').textContent = 'Vue formateur';
    document.getElementById('heroMeta').textContent = 'Mode edition des ressources';
    document.getElementById('userAv').textContent = '\u270f\ufe0f';
    document.getElementById('userName').textContent = 'Formateur';
    renderResources();
    return;
  }
  // Session stagiaire existante ?
  const sess = sessionStorage.getItem(SESSION_KEY);
  if (sess) {
    try {
      const { id } = JSON.parse(sess);
      const cand = getAppData().candidats.find(c => c.id === id);
      if (cand) { showApp(cand); return; }
    } catch(e) {}
  }
  // Sinon afficher login
  document.getElementById('screenLogin').style.display = 'flex';
})();
</script>
