.niv3 .niv-cell-icon { background: var(--n3-soft); color: var(--n3); border-color: var(--n3-mid); }
.niv3 .niv-cell-name { color: var(--n3-lbl); }
.niv3.sel .niv-cell-icon { background: var(--n3); color: white; border-color: var(--n3); }
.niv3.sel .niv-cell-desc { color: var(--n3-lbl); font-style: normal; }
.niv4 .niv-cell-bar { background: var(--n4); }
.niv4 .niv-cell-icon { background: var(--n4-soft); color: var(--n4); border-color: var(--n4-mid); }
.niv4 .niv-cell-name { color: var(--n4-lbl); }

.crit-obs { display: flex; align-items: center; gap: 8px; padding: 7px 13px; background: var(--surface2); border-top: 1px solid var(--border); }
.obs-lbl { font-size: 0.58rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink3); flex-shrink: 0; }
.obs-inp { flex: 1; border: none; background: transparent; font-family: 'Instrument Sans', sans-serif; font-size: 0.76rem; color: var(--ink2); outline: none; }
.obs-inp::placeholder { color: var(--ink4); font-style: italic; }

/* RIGHT */
.panel-right { background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; }
.pr-head { padding: 12px 15px; border-bottom: 1px solid var(--border); font-family: 'Syne', sans-serif; font-size: 0.63rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink3); background: var(--surface2); }
.pr-block { padding: 12px 15px; border-bottom: 1px solid var(--border); }
.pr-lbl { font-size: 0.59rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.13em; color: var(--ink3); margin-bottom: 9px; }
.cand-head { display: flex; align-items: center; gap: 9px; }
.cand-head-av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700; flex-shrink: 0; }
.cand-head-name { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; }
.cand-head-id { font-family: 'Syne Mono', monospace; font-size: 0.63rem; color: var(--ink3); margin-top: 1px; }
.sc-row { display: flex; align-items: center; gap: 6px; padding: 3px 4px; border-radius: 5px; cursor: pointer; transition: background 0.12s; margin-bottom: 3px; }
.sc-row:hover { background: var(--surface2); }
.sc-row.is-active { background: var(--surface2); }
.sc-name { font-size: 0.7rem; color: var(--ink2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sc-name.bold { font-weight: 600; color: var(--ink); }
.sc-filled { font-size: 0.58rem; color: var(--ink3); flex-shrink: 0; }
.sc-val { font-family: 'Syne Mono', monospace; font-size: 0.72rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; min-width: 40px; text-align: center; flex-shrink: 0; }
.global-line { display: flex; align-items: center; justify-content: space-between; margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border); }
.global-lbl { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--ink2); }

.profil-row { margin-bottom: 8px; }

.profil-bar { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; display: flex; margin-bottom: 3px; }
.profil-seg { height: 100%; }
.distrib-pills { display: flex; gap: 2px; }
.d-pill { flex: 1; text-align: center; padding: 2px 0; border-radius: 3px; font-family: 'Syne Mono', monospace; font-size: 0.62rem; font-weight: 700; }
.statut-sel { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface2); font-family: 'Instrument Sans', sans-serif; font-size: 0.8rem; color: var(--ink); outline: none; cursor: pointer; }
.comment-ta { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); font-family: 'Instrument Sans', sans-serif; font-size: 0.77rem; color: var(--ink2); outline: none; resize: vertical; min-height: 68px; line-height: 1.6; transition: border-color 0.15s; }
.comment-ta:focus { border-color: var(--accent2); background: white; }
.save-bar { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: #1c1a16; color: white; padding: 10px 18px; border-radius: 8px; font-size: 0.79rem; font-weight: 600; display: flex; align-items: center; gap: 8px; opacity: 0; transform: translateY(8px); transition: all 0.22s; pointer-events: none; }
.save-bar.show { opacity: 1; transform: none; }

<!-- ═══════════════════════════════════════════════════
     SUPABASE CONFIG — Remplacez les deux valeurs ci-dessous
     par celles trouvées dans Supabase > Settings > API
═══════════════════════════════════════════════════ -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ┌─────────────────────────────────────────────────────┐
// │  ÉTAPE 5 — Collez vos valeurs Supabase ici          │
// └─────────────────────────────────────────────────────┘
const SUPABASE_URL  = 'https://dxjdirhfcdtvdsayhigm.supabase.co';   // ← remplacez
const SUPABASE_ANON_KEY = 'sb_publishable_7sHrBN4HyQ5M0MxxQUbE1g_GyP6Qw1T';             // ← remplacez

// ── Initialisation du client Supabase ──
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Clés de stockage local ──
const SHARED_KEY_SB = 'formapp_data';
const CRIT_KEY_SB   = 'formapp_criteres';
const QCM_KEY_SB    = 'formapp_qcm_results';
const CODES_KEY_SB  = 'formapp_qcm_codes';
const SESSION_TABLE = 'formapp_sessions';   // table Supabase unique

// ════════════════════════════════════════════════════════
// COUCHE DE SYNCHRONISATION
// Principe : localStorage = cache immédiat
//            Supabase     = source de vérité partagée
// ════════════════════════════════════════════════════════

// Identifiant de session unique (clé de partitionnement des données)
// Utilise la promo+date ou un UUID fixe stocké localement
function getSessionKey() {
  let k = localStorage.getItem('formapp_session_key');
  if (!k) {
    k = 'session_' + Date.now();
    localStorage.setItem('formapp_session_key', k);
  }
  return k;
}

// ── PUSH : envoie les données locales vers Supabase ──
async function pushToSupabase() {
  try {
    const sessionKey = getSessionKey();
    const payload = {
      session_key: sessionKey,
      shared_data: localStorage.getItem(SHARED_KEY_SB) || '{}',
      crit_data:   localStorage.getItem(CRIT_KEY_SB)   || '{}',
      qcm_results: localStorage.getItem(QCM_KEY_SB)    || '{}',
      qcm_codes:   localStorage.getItem(CODES_KEY_SB)  || '{}',
      updated_at:  new Date().toISOString(),
    };
    const { error } = await _sb.from(SESSION_TABLE).upsert(payload, { onConflict: 'session_key' });
    if (error) console.warn('[Supabase push]', error.message);
  } catch(e) { console.warn('[Supabase push error]', e); }
}

// ── PULL : charge les données depuis Supabase vers le localStorage ──
async function pullFromSupabase() {
  try {
    const sessionKey = getSessionKey();
    const { data, error } = await _sb.from(SESSION_TABLE)
      .select('*')
      .eq('session_key', sessionKey)
      .single();
    if (error) { console.warn('[Supabase pull]', error.message); return false; }
    if (!data) return false;

    if (data.shared_data && data.shared_data !== '{}')
      localStorage.setItem(SHARED_KEY_SB, data.shared_data);
    if (data.crit_data && data.crit_data !== '{}')
      localStorage.setItem(CRIT_KEY_SB, data.crit_data);
    if (data.qcm_results && data.qcm_results !== '{}')
      localStorage.setItem(QCM_KEY_SB, data.qcm_results);
    if (data.qcm_codes && data.qcm_codes !== '{}')
      localStorage.setItem(CODES_KEY_SB, data.qcm_codes);
    return true;
  } catch(e) { console.warn('[Supabase pull error]', e); return false; }
}

// ── Abonnement temps réel : actualise si un autre appareil modifie ──
function subscribeRealtime(onUpdate) {
  const sessionKey = getSessionKey();
  _sb.channel('formapp-realtime')
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: SESSION_TABLE,
      filter: `session_key=eq.${sessionKey}`,
    }, async (payload) => {
      const d = payload.new;
      if (d.shared_data) localStorage.setItem(SHARED_KEY_SB, d.shared_data);
      if (d.crit_data)   localStorage.setItem(CRIT_KEY_SB,   d.crit_data);
      if (d.qcm_results) localStorage.setItem(QCM_KEY_SB,    d.qcm_results);
      if (d.qcm_codes)   localStorage.setItem(CODES_KEY_SB,  d.qcm_codes);
      if (typeof onUpdate === 'function') onUpdate();
    })
    .subscribe();
}

// ── saveAndSync : remplace les saveData() existants ──
// Appeler après chaque modification locale pour syncer vers Supabase
let _syncTimer = null;
function saveAndSync() {
  // Debounce : attend 800ms d'inactivité avant d'envoyer
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => pushToSupabase(), 800);
}

// ── Auto-pull au chargement de la page ──
(async function initSupabase() {
  const indicator = document.createElement('div');
  indicator.id = 'sb-indicator';
  indicator.style.cssText = 'position:fixed;bottom:60px;right:20px;z-index:9999;' +
    'background:rgba(10,12,16,0.8);color:#4ade80;padding:8px 14px;' +
    'border-radius:8px;font-family:monospace;font-size:11px;' +
    'border:1px solid rgba(74,222,128,0.3);display:none;';
  document.body.appendChild(indicator);

  function showIndicator(msg, color='#4ade80') {
    indicator.style.color = color;
    indicator.textContent = msg;
    indicator.style.display = 'block';
    setTimeout(() => { indicator.style.display = 'none'; }, 2500);
  }

  // Vérifier si Supabase est configuré
  if (SUPABASE_URL.includes('VOTRE_URL')) {
    console.info('[FormApp] Mode local — Supabase non configuré');
    return; // Fonctionne en mode localStorage uniquement
  }

  showIndicator('⟳ Synchronisation...', '#fbbf24');
  const ok = await pullFromSupabase();
  if (ok) {
    showIndicator('✓ Données synchronisées');
    // Déclencher un refresh si la page a déjà rendu des données
    if (typeof renderDashboard === 'function') renderDashboard();
    if (typeof render === 'function') render();
    if (typeof app_init === 'function') app_init();
  }

  // Écouter les changements en temps réel
  subscribeRealtime(() => {
    showIndicator('↻ Mise à jour reçue');
    if (typeof renderDashboard === 'function') renderDashboard();
    if (typeof render === 'function') render();

    critData = { ateliers: DEFAULT_CRIT, evaluations:{} };
    localStorage.setItem(CRIT_KEY, JSON.stringify(critData));
  }

  if (!localStorage.getItem(SHARED_KEY)) localStorage.setItem(SHARED_KEY, JSON.stringify(appData));
  activeCandId = appData.candidats.find(c => c.statut !== 'absent')?.id || null;
  activeAtelId = critData.ateliers[0]?.id || null;
}

function persist() {
  appData.candidats.forEach(c => {
    if (!c.scores) c.scores = {};
    critData.ateliers.forEach(at => {
      const s = atelierScore(c.id, at.id);
      c.scores[at.id] = s !== null ? Math.round(s * 20 * 10) / 10 : null;
    });
  });
  localStorage.setItem(SHARED_KEY, JSON.stringify(appData));
  localStorage.setItem(CRIT_KEY, JSON.stringify(critData));
  if(typeof saveAndSync==="function") saveAndSync();
}

function autosave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => { persist(); flashSave(); }, 500);
}

function flashSave() {
  const b = document.getElementById('saveBar');
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 1800);
}
function saveAll() { persist(); flashSave(); }

// ═══════════════════════════════════════════════════════
// HELPERS EVAL
// ═══════════════════════════════════════════════════════
function getEval(cid, rid) { return critData.evaluations[cid]?.[rid] ?? null; }
function setEval(cid, rid, val) {
  if (!critData.evaluations[cid]) critData.evaluations[cid] = {};
  if (val === null) delete critData.evaluations[cid][rid];
  else critData.evaluations[cid][rid] = val;
  autosave();
}
function getObs(cid, rid) { return critData.evaluations[cid]?.['obs_'+rid] || ''; }
function setObs(cid, rid, v) {
  if (!critData.evaluations[cid]) critData.evaluations[cid] = {};
  critData.evaluations[cid]['obs_'+rid] = v;
  autosave();
}
function allCriteres(atelId) {
  return critData.ateliers.find(a => a.id===atelId)?.sousSections.flatMap(ss => ss.criteres) || [];
}
function atelierScore(cid, atelId) {
  const crs = allCriteres(atelId);
  if (!crs.length) return null;
  const rated = crs.filter(c => getEval(cid,c.id) !== null);
  if (!rated.length) return null;
  const sum = crs.reduce((s,c) => {
    const n = getEval(cid,c.id);
    return s + (n!==null ? NIVEAUX.find(x=>x.id===n).score : 0);
  }, 0);
  return sum / crs.length;
}
function countFilled(cid, atelId) {
  const crs = allCriteres(atelId);
  return { filled: crs.filter(c=>getEval(cid,c.id)!==null).length, total: crs.length };
}
function distribNiveaux(cid, atelId) {
  const counts=[0,0,0,0];
  allCriteres(atelId).forEach(c=>{const n=getEval(cid,c.id);if(n)counts[n-1]++;});
  return counts;
}
function scoreDisplay(s) {
  if (s===null) return {val:'—',color:'var(--ink3)',bg:'var(--surface2)'};
  const v = Math.round(s*20*10)/10;
  if (v>=12) return {val:v.toFixed(1),color:'var(--n3)',bg:'var(--n3-soft)'};
  if (v>=8)  return {val:v.toFixed(1),color:'var(--n2)',bg:'var(--n2-soft)'};
  return            {val:v.toFixed(1),color:'var(--n1)',bg:'var(--n1-soft)'};
}

// ═══════════════════════════════════════════════════════
// RENDER LEFT
// ═══════════════════════════════════════════════════════
function renderLeft() {
  const cl = document.getElementById('candList');
  cl.innerHTML = '';
  appData.candidats.forEach((c,i) => {
    const col = AV_COLS[i%AV_COLS.length];
    const isAct = c.id===activeCandId, isAbs = c.statut==='absent';
    const dotCol = {admis:'var(--n3)',refuse:'var(--n1)','en-cours':'var(--n2)',absent:'var(--ink3)'}[c.statut];
    const d = document.createElement('div');
    d.className = 'cand-pill'+(isAct?' active':'');
    d.style.opacity = isAbs?'0.4':'1';
    d.style.cursor = isAbs?'not-allowed':'pointer';
    d.innerHTML = `
      <div class="cp-av" style="background:${col.bg};color:${col.fg}">${c.prenom[0]}${c.nom[0]}</div>
      <div style="flex:1;min-width:0"><div class="cp-name">${c.prenom} ${c.nom}</div><div class="cp-id">${c.id}</div></div>
      <div class="cp-dot" style="background:${isAct?'rgba(255,255,255,0.4)':dotCol}"></div>`;
    if(!isAbs) d.onclick=()=>{activeCandId=c.id;if(!activeAtelId)activeAtelId=critData.ateliers[0]?.id;render();};
    cl.appendChild(d);
  });

  const an = document.getElementById('atNav');
  an.innerHTML = '';
  critData.ateliers.forEach((at,i) => {
    const {filled,total} = activeCandId?countFilled(activeCandId,at.id):{filled:0,total:0};
    const pct = total>0?Math.round(filled/total*100):0;
    const isAct = at.id===activeAtelId;
    const col = AT_COLS[i%AT_COLS.length];
    const circ = 2*Math.PI*10.5, off = circ-(pct/100)*circ;
    const ringCol = pct===100?'var(--n3)':isAct?'var(--accent2)':'var(--ink3)';
    const d = document.createElement('div');
    d.className = 'at-item'+(isAct?' active':'');
    d.innerHTML = `
      <div class="at-icon" style="background:${col.bg};color:${col.fg}">${at.icon}</div>
      <div style="min-width:0"><div class="at-name">${at.nom}</div><div class="at-meta">${total} critères · ×${at.coeff}</div></div>
      <div class="at-ring">
        <svg width="27" height="27" viewBox="0 0 27 27">
          <circle cx="13.5" cy="13.5" r="10.5" fill="none" stroke="var(--border)" stroke-width="2.5"/>
          <circle cx="13.5" cy="13.5" r="10.5" fill="none" stroke="${ringCol}" stroke-width="2.5"
            stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}" stroke-linecap="round"
            style="transform:rotate(-90deg);transform-origin:50% 50%"/>
        </svg>
        <div class="at-ring-lbl">${pct}%</div>
      </div>`;
    d.onclick=()=>{if(!activeCandId)return;activeAtelId=at.id;render();};
    an.appendChild(d);
  });
}

// ═══════════════════════════════════════════════════════
// RENDER CENTER
// ═══════════════════════════════════════════════════════
function renderCenter() {
  const center = document.getElementById('pCenter');
  if (!activeCandId||!activeAtelId) {
    center.innerHTML='<div class="empty-c"><svg width="42" height="42" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg><p>Sélectionnez un candidat puis un atelier</p></div>';
    return;
  }
  const at = critData.ateliers.find(a=>a.id===activeAtelId);
  const cand = appData.candidats.find(c=>c.id===activeCandId);
  if (!at||!cand) return;

  const aidx = critData.ateliers.indexOf(at);
  const col = AT_COLS[aidx%AT_COLS.length];
  const score = atelierScore(activeCandId,activeAtelId);
  const sd = scoreDisplay(score);
  const {filled,total} = countFilled(activeCandId,activeAtelId);

  let html = `
    <div class="eval-header">
      <div class="eval-icon" style="background:${col.bg};color:${col.fg}">${at.icon}</div>
      <div>
        <div class="eval-title">${at.nom}</div>
        <div class="eval-sub" id="evalSub">${cand.prenom} ${cand.nom} · ${filled}/${total} critères évalués · Coefficient ×${at.coeff}</div>
      </div>
      <div class="eval-right">
        <div class="eval-score" id="evalScore" style="color:${sd.color}">${sd.val}</div>
        <div class="eval-score-lbl">${score!==null?'/ 20':'en attente'}</div>
      </div>
    </div>
    <div class="niv-legend">
      ${NIVEAUX.map((n,i)=>`
        <div class="niv-leg-item" style="background:${n.soft}">
          <div class="niv-leg-dot" style="background:${n.color}"></div>
          <span class="niv-leg-txt" style="color:${n.lbl}">${n.label}</span>
          <span class="niv-leg-score">${NIV_RANGE[i]}</span>
        </div>`).join('')}
    </div>`;

  at.sousSections.forEach((ss,ssi) => {
    html += `<div class="ss-title">${ss.titre}</div>`;
    ss.criteres.forEach((cr,cri) => {
      const sel = getEval(activeCandId,cr.id);
      const obs = getObs(activeCandId,cr.id);
      const selN = sel?NIVEAUX.find(n=>n.id===sel):null;
      html += `
        <div class="crit-card" style="animation-delay:${(ssi*6+cri)*0.03}s">
          <div class="crit-top">
            <div class="crit-num">${String(ssi*10+cri+1).padStart(2,'0')}</div>
            <div class="crit-label">${cr.label}</div>
            <div class="crit-badge" id="badge_${cr.id}"
              style="background:${selN?selN.soft:'var(--surface2)'};color:${selN?selN.lbl:'var(--ink3)'}">
              ${selN?selN.label:'Non évalué'}
            </div>
          </div>
          <div class="niv-grid">
            ${NIVEAUX.map((n,ni)=>`
              <div class="niv-cell ${n.cls}${sel===n.id?' sel':''}" id="nc_${cr.id}_${n.id}"
                onclick="clickNiv('${activeCandId}','${cr.id}',${n.id})">
                <div class="niv-cell-bar"></div>
                <div class="niv-cell-head">
                  <div class="niv-cell-icon">${n.icon}</div>
                  <div class="niv-cell-name">${n.label}</div>
                </div>
                <div class="niv-cell-desc">${cr.descriptions[ni]}</div>
              </div>`).join('')}
          </div>
          <div class="crit-obs">
            <span class="obs-lbl">Obs.</span>
            <input class="obs-inp" type="text" value="${obs.replace(/"/g,'&quot;')}"
              placeholder="Observation sur ce critère…"
              onchange="setObs('${activeCandId}','${cr.id}',this.value)">
          </div>
        </div>`;
    });
  });

  center.innerHTML = html;
}

// ═══════════════════════════════════════════════════════
// RENDER RIGHT
// ═══════════════════════════════════════════════════════
function renderRight() {
  const pr = document.getElementById('pRight');
  if (!activeCandId) { pr.innerHTML='<div class="empty-c" style="height:150px"><p>Sélectionnez un candidat</p></div>'; return; }
  const cand = appData.candidats.find(c=>c.id===activeCandId);
  if (!cand) return;
  const ci = appData.candidats.indexOf(cand)%AV_COLS.length;
  const col = AV_COLS[ci];

  let pts=0,coeff=0;
  critData.ateliers.forEach(at=>{const s=atelierScore(activeCandId,at.id);if(s!==null){pts+=s*at.coeff;coeff+=at.coeff;}});
  const gsd = scoreDisplay(coeff>0?pts/coeff:null);

  let html = `
    <div class="pr-block">
      <div class="cand-head">
        <div class="cand-head-av" style="background:${col.bg};color:${col.fg}">${cand.prenom[0]}${cand.nom[0]}</div>
        <div><div class="cand-head-name">${cand.prenom} ${cand.nom}</div><div class="cand-head-id">${cand.id}</div></div>
      </div>
    </div>
    <div class="pr-block">
      <div class="pr-lbl">Scores par atelier</div>`;

  critData.ateliers.forEach(at=>{
    const s=atelierScore(activeCandId,at.id);
    const sd=scoreDisplay(s);
    const {filled,total}=countFilled(activeCandId,at.id);
    const isAct=at.id===activeAtelId;
    html+=`<div class="sc-row${isAct?' is-active':''}" onclick="activeAtelId='${at.id}';render()">
      <div class="sc-name${isAct?' bold':''}">${at.icon} ${at.nom}</div>
      <span class="sc-filled">${filled}/${total}</span>
      <div class="sc-val" style="background:${sd.bg};color:${sd.color}">${sd.val}</div>
    </div>`;
  });

  html+=`
      <div class="global-line">
        <div class="global-lbl">Moyenne globale</div>
        <div class="global-val" style="color:${gsd.color}">${gsd.val}</div>
      </div>
    </div>
    <div class="pr-block">
      <div class="pr-lbl">Profil de compétences</div>`;

  const nCols=['var(--n1)','var(--n2)','var(--n3)','var(--n4)'];
  critData.ateliers.forEach(at=>{
    const dist=distribNiveaux(activeCandId,at.id);
    const tot=dist.reduce((a,b)=>a+b,0);
    html+=`<div class="profil-row">
      <div class="profil-name">${at.icon} ${at.nom}</div>
      <div class="profil-bar">
        ${tot>0?dist.map((v,i)=>v>0?`<div class="profil-seg" style="flex:${v};background:${nCols[i]}"></div>`:'').join(''):'<div style="flex:1;background:var(--surface2)"></div>'}
      </div>
      <div class="distrib-pills">
        ${dist.map((v,i)=>`<div class="d-pill" style="background:${NIVEAUX[i].soft};color:${NIVEAUX[i].lbl}">${v}</div>`).join('')}
      </div>
    </div>`;
  });

  html+=`</div>
    <div class="pr-block">
      <div class="pr-lbl">Statut</div>
      <select class="statut-sel" onchange="updateStatut('${cand.id}',this.value)">
        <option value="en-cours" ${cand.statut==='en-cours'?'selected':''}>⏳ En cours</option>
        <option value="admis"    ${cand.statut==='admis'   ?'selected':''}>✓ Admis</option>
        <option value="refuse"   ${cand.statut==='refuse'  ?'selected':''}>✗ Refusé</option>
        <option value="absent"   ${cand.statut==='absent'  ?'selected':''}>○ Absent</option>
      </select>
    </div>
    <div class="pr-block" style="border-bottom:none">
      <div class="pr-lbl">Commentaire encadrant</div>
      <textarea class="comment-ta" placeholder="Observations générales…"
        onchange="updateComment('${cand.id}',this.value)">${cand.commentaire||''}</textarea>
    </div>`;

  pr.innerHTML = html;
}

// ═══════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════
function clickNiv(cid,rid,nid) {
  const cur = getEval(cid,rid);
  const next = cur===nid?null:nid;
  setEval(cid,rid,next);

  NIVEAUX.forEach(n=>{
    const cell=document.getElementById(`nc_${rid}_${n.id}`);
    if(!cell)return;
    cell.className=`niv-cell ${n.cls}`+(next===n.id?' sel':'');
  });

  const badge=document.getElementById(`badge_${rid}`);
  if(badge){
    const sn=next?NIVEAUX.find(n=>n.id===next):null;
    badge.style.background=sn?sn.soft:'var(--surface2)';
    badge.style.color=sn?sn.lbl:'var(--ink3)';
    badge.textContent=sn?sn.label:'Non évalué';
  }

  const sc=atelierScore(cid,activeAtelId);
  const sd=scoreDisplay(sc);
  const big=document.getElementById('evalScore');
  if(big){big.textContent=sd.val;big.style.color=sd.color;}
  const {filled,total}=countFilled(cid,activeAtelId);
  const sub=document.getElementById('evalSub');
  const cand=appData.candidats.find(c=>c.id===cid);
  if(sub&&cand) sub.textContent=`${cand.prenom} ${cand.nom} · ${filled}/${total} critères évalués · Coefficient ×${critData.ateliers.find(a=>a.id===activeAtelId)?.coeff}`;

  renderRight();
  renderLeft();
}

function updateStatut(cid,s){const c=appData.candidats.find(x=>x.id===cid);if(c){c.statut=s;autosave();renderLeft();}}
function updateComment(cid,v){const c=appData.candidats.find(x=>x.id===cid);if(c){c.commentaire=v;autosave();}}

function render() {
  document.getElementById('topbarMeta').textContent=`${appData.promo||'—'} · ${appData.date||'—'} · ${appData.formateur||'—'}`;
  renderLeft();
  renderCenter();
  renderRight();
}

boot();
render();
</script>

          else window.location.href = h;
        });
      }
    });
    // location.href assignments handled by native navigation if not in iframe
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', patchLinks);
  else patchLinks();
  // Listen for focus signal from portal
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'formapp-focus') {
      // optional: refresh dynamic content here
    }
  });
})();
